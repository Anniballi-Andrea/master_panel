<!DOCTYPE html>
<html lxmls:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments/style :: style}"></th:block>
    <title>Modifica Tratto</title>
</head>

<body>
    <header>
        <th:block th:replace="~{fragments/nav :: nav}"></th:block>
    </header>
    <main>
        <div class="container bg-light mt-3">


            <form id="trait-create-form" th:action="@{/trait/edit/{id}(id=${trait.id})}" method="post"
                th:object="${trait}">
                <h1>Modifica tratto tratto a [[*{monster.name}]]</h1>

                <input type="hidden" th:field="*{monster.id}">
                <div class="mb-3" th:if="${#fields.hasErrors()}">
                    <p class="text-danger">completa i campi con un errore</p>
                </div>
                <div class="mt-3">
                    <label class="form-label" for="name">Tratto:</label>
                    <input class="form-control" type="text" id="name" placeholder="inserisci il nome del tratto"
                        th:field="*{name}" th:errorClass="is-invalid">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}">
                        <ul>
                            <li th:each="error : ${#fields.errors('name')}" th:text="${error}" />
                        </ul>
                    </div>
                </div>
                <div class="my-3 pb-4">
                    <label class="form-label" for="effect">Descrizione:</label>
                    <textarea class="form-control" type="file" id="effect" placeholder="inserisci cosa fa il tratto"
                        th:field="*{effect}" th:errorClass="is-invalid"></textarea>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('effect')}">
                        <ul>
                            <li th:each="error : ${#fields.errors('effect')}" th:text="${error}" />
                        </ul>
                    </div>
                    <div class="col-12 d-flex justify-content-center mt-4 pb-4">
                        <button class="btn btn-primary" type="submit">Conferma</button>
                    </div>
                </div>
            </form>
        </div>
    </main>
</body>
