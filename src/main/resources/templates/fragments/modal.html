<th:block th:fragment="modal(id, message,url )">
    <button type="button" class="btn btn-danger btn-sm" data-bs-toggle="modal" th:data-bs-target="|#delete-${id}|">
        <i class="bi bi-trash3"></i>
    </button>
    <div class="modal fade" th:id="|delete-${id}|" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">conferma</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" th:text="${message}">

                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Close</button>
                    <form action="#" th:action="${url}" method="post">
                        <button type="submit" class="btn btn-danger btn-sm">conferma

                        </button>

                    </form>
                </div>
            </div>
        </div>
    </div>

</th:block>



</html>
